name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Configure Git
      run: |
        git config --global user.name "CI/CD"
        git config --global user.email "ci@rbpo.local"
    
    - name: Build with Maven
      run: mvn clean package -DskipTests
      env:
        DB_USERNAME: ${{ secrets.DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    
    - name: Run tests
      run: mvn test
      env:
        DB_USERNAME: ${{ secrets.DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    
    - name: Create keystore from secrets
      if: ${{ secrets.KEYSTORE_BASE64 && secrets.KEYSTORE_PASSWORD }}
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > src/main/resources/keystore.p12
        echo "${{ secrets.TRUSTSTORE_BASE64 }}" | base64 -d > src/main/resources/truststore.p12 || echo "Truststore not provided"
      shell: bash
    
    - name: Build with keystore
      if: ${{ secrets.KEYSTORE_BASE64 && secrets.KEYSTORE_PASSWORD }}
      run: mvn clean package -DskipTests
      env:
        SSL_ENABLED: true
        SSL_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        SSL_TRUSTSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: bulletin-board-jar
        path: target/*.jar
        retention-days: 30
    
    - name: Upload keystore (if exists)
      if: ${{ secrets.KEYSTORE_BASE64 }}
      uses: actions/upload-artifact@v3
      with:
        name: keystore
        path: src/main/resources/keystore.p12
        retention-days: 1
        if-no-files-found: ignore

