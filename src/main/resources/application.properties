spring.application.name=bulletin-board
server.port=8080
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=${SSL_KEYSTORE_TYPE:PKCS12}
server.ssl.key-alias=${SSL_KEY_ALIAS:bulletin-board}
server.ssl.trust-store=${SSL_TRUSTSTORE:classpath:truststore.p12}
server.ssl.trust-store-password=${SSL_TRUSTSTORE_PASSWORD:changeit}
server.ssl.trust-store-type=${SSL_TRUSTSTORE_TYPE:PKCS12}

spring.datasource.url=jdbc:postgresql://localhost:5432/bulletin_board
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

jwt.secret=mySecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLongForSecurityPurposes
jwt.access-token-expiration=900
jwt.refresh-token-expiration=604800

